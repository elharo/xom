name: CI

on:
  push:
    branches: [ main, master, 'release/**' ]
  pull_request:
    branches: [ main, master, 'release/**' ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION_QUALIFIER: ${{ github.event_name == 'push' && github.ref_name == 'master' && '-SNAPSHOT' || '' }}
    
    strategy:
      matrix:
        java-version: [8, 11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.ant/lib
          ~/.ivy2/
          lib/
          ivy/
        key: ${{ runner.os }}-ant-${{ hashFiles('build.xml', 'ivy.xml') }}
        restore-keys: |
          ${{ runner.os }}-ant-
    
    - name: Run tests
      run: ant -Dversionqualifier=${{ env.VERSION_QUALIFIER }} -Dtest.haltonfailure=true test
    
    - name: Build dist
      run: ant -Dversionqualifier=${{ env.VERSION_QUALIFIER }} dist

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-java-${{ matrix.java-version }}
        path: testresults/

  test-modern-jdk:
    runs-on: ubuntu-latest
    env:
      VERSION_QUALIFIER: ${{ github.event_name == 'push' && github.ref_name == 'master' && '-SNAPSHOT' || '' }}

    strategy:
      matrix:
        java-version: [17, 21, 25]

    steps:
    - uses: actions/checkout@v4

    - name: Set up test JDK ${{ matrix.java-version }}
      id: setup-test-jdk
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Set up compile JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: 8
        distribution: 'temurin'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.ant/lib
          ~/.ivy2/
          lib/
          ivy/
        key: ${{ runner.os }}-ant-${{ hashFiles('build.xml', 'ivy.xml') }}
        restore-keys: |
          ${{ runner.os }}-ant-

    - name: Run tests on JDK ${{ matrix.java-version }}
      run: ant -Dversionqualifier=${{ env.VERSION_QUALIFIER }} -Dtest.haltonfailure=true -Djvm=${{ steps.setup-test-jdk.outputs.path }}/bin/java test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-java-${{ matrix.java-version }}
        path: testresults/

  reproducible-build:
    runs-on: ubuntu-latest
    env:
      VERSION_QUALIFIER: ${{ github.event_name == 'push' && github.ref_name == 'master' && '-SNAPSHOT' || '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: 8
        distribution: 'temurin'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.ant/lib
          ~/.ivy2/
          lib/
          ivy/
        key: ${{ runner.os }}-ant-${{ hashFiles('build.xml', 'ivy.xml') }}
        restore-keys: |
          ${{ runner.os }}-ant-

    - name: Verify reproducible build
      run: |
        chmod +x verify-reproducible.sh
        VERSION_QUALIFIER=${{ env.VERSION_QUALIFIER }} ./verify-reproducible.sh
